syntax = "proto3";

package resq.health;

import "google/protobuf/timestamp.proto";

enum SystemState {
  // Guards against proto3's zero-default masking failures: an unset
  // overall_state / state must not read as HEALTHY.
  SYSTEM_STATE_UNSPECIFIED = 0;
  HEALTHY = 1;
  DEGRADED = 2;
  UNHEALTHY = 3;
}

enum DependencyType {
  DEPENDENCY_TYPE_UNSPECIFIED = 0;
  DATABASE = 1;
  CACHE = 2;
  MESSAGE_BROKER = 3;
  PEER_SERVICE = 4;
  INTERNAL_ENGINE = 5;
}

message DependencyCheck {
  string name = 1;
  DependencyType type = 2;
  SystemState state = 3;
  double latency_ms = 4;
  string error_code = 5;
  string detail = 6;
}

message ResourceMetrics {
  double cpu_usage_percent = 1;
  uint64 memory_bytes_used = 2;
  uint64 memory_bytes_total = 3;
  uint64 disk_bytes_free = 4;
}

message HealthResponse {
  string service_name = 1;
  SystemState overall_state = 2;
  uint64 uptime_seconds = 3;
  google.protobuf.Timestamp timestamp = 4;
  repeated DependencyCheck dependencies = 5;
  ResourceMetrics resources = 6;
  string version = 7;
}

message HealthRequest {
  bool include_resources = 1;
}

service ResQDiagnosticService {
  rpc GetDetailedHealth(HealthRequest) returns (HealthResponse);
}
