name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Determine proto sync mode
        id: proto_source
        run: |
          if grep -q 'BOOTSTRAP_PENDING_FIRST_PUBLISH' proto-source.lock; then
            echo "needs_buf=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_buf=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Buf
        if: steps.proto_source.outputs.needs_buf == 'true'
        uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
      - run: bash scripts/sync-protos.sh
      - run: git diff --exit-code -- protos
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
      - run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          directory: ./coverage
          fail_ci_if_error: false
