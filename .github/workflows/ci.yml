#
# Thin CI wrapper. Dispatches to the org-wide reusable `required`
# aggregator in resq-software/.github (which calls dotnet-ci +
# security-scan). The top-level `required` job emits the status-
# check context consumed by the org ruleset `default-branch-baseline`.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    # Job-scoped permissions: CodeQL needs security-events:write to
    # upload SARIF; PR metadata read is needed by some scanners.
    # Keeping the workflow-level grant at contents:read avoids
    # blanket write tokens for follow-on jobs.
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read
    uses: resq-software/.github/.github/workflows/required.yml@73b9edb8f4f28a99f70ee22eb5e2dd2bf7807c84
    with:
      lang: dotnet
      dotnet-solution: ResQ.Sdk.sln
      codeql-languages: '["csharp"]'
    # No org secrets are required for the CodeQL-only path
    # (semgrep / gitleaks / snyk are disabled here). GITHUB_TOKEN
    # is automatic, so we drop the unconditional secrets:inherit.

  required:
    name: required
    runs-on: ubuntu-latest
    needs: [gates]
    if: always()
    steps:
      - env:
          R: ${{ needs.gates.result }}
        run: |
          set -eu
          case "$R" in
            success|skipped|"") echo "ok: gates=$R" ;;
            *) echo "::error::gates reusable returned: $R"; exit 1 ;;
          esac
