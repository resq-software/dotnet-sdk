name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      BUF_API_TOKEN: ${{ secrets.BUF_API_TOKEN }}
      DOTNET_ROLL_FORWARD: LatestFeature
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          buf_user: ${{ secrets.BUF_USER }}
          buf_api_token: ${{ secrets.BUF_API_TOKEN }}
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: "9.0.x"
      - if: ${{ env.BUF_API_TOKEN != '' }}
        env:
          BUF_TOKEN: ${{ secrets.BUF_API_TOKEN }}
        run: bash scripts/sync-protos.sh
      - name: Check for synced proto drift
        if: ${{ env.BUF_API_TOKEN != '' }}
        run: |
          if [[ -n "$(git status --porcelain -- protos)" ]]; then
            echo "Proto drift detected:"
            git status --short -- protos
            exit 1
          fi
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
      - run: dotnet format --verify-no-changes
      - run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          directory: ./coverage
          fail_ci_if_error: false
